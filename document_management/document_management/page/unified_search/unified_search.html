<div class="unified-search">
    <section class="search-hero">
        <div>
            <h3>Unified Search</h3>
            <p>Search indexed operational records and permitted documents.</p>
        </div>
        <div class="search-controls">
            <div class="search-input-wrap">
                <i class="fa fa-search"></i>
                <input id="unified-search-input" type="search"
                    placeholder="Search customers, loans, transactions, documents...">
                <button class="btn btn-primary" id="unified-search-button">
                    Search
                </button>
            </div>
            <div id="unified-search-types" class="search-types"></div>
        </div>
    </section>
    <div id="unified-search-status" class="search-status"></div>
    <main id="unified-search-results" class="search-results">
        <div class="search-empty">
            <i class="fa fa-search"></i>
            <strong>Enter a query to search the configured indexes.</strong>
        </div>
    </main>
</div>
